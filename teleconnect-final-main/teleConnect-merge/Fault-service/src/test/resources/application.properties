# Test profile — repository tests run against in-memory H2.
# Overrides the production ddl-auto=none / MySQL dialect so @DataJpaTest
# creates the schema from the entities automatically.
spring.datasource.url=jdbc:h2:mem:teleconnect_test;DB_CLOSE_DELAY=-1;MODE=MySQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=root

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=false
