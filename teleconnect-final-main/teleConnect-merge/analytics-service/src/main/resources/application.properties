spring.application.name=analytics-service

# Default local datasource: MySQL (matches other reactor modules).
# Override with DB_URL/DB_USERNAME/DB_PASSWORD/DB_DRIVER_CLASS_NAME for H2 or another env.
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/teleconnect_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=${DB_DRIVER_CLASS_NAME:com.mysql.cj.jdbc.Driver}

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=${DDL_AUTO:update}
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=${HIBERNATE_DIALECT:org.hibernate.dialect.MySQLDialect}
spring.sql.init.mode=never
spring.sql.init.continue-on-error=true
spring.jpa.defer-datasource-initialization=true

# Jackson
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.date-format=yyyy-MM-dd

# Server
server.port=8089
server.servlet.context-path=/teleConnect

# JWT (must match IAM's signing key so tokens issued by IAM validate here)
jwt.secret=TeleConnect_Super_Secret_Key_2024_IAM_Min32Chars_XYZ
jwt.expiration=1800000
jwt.renewal.threshold.ms=600000

# Analytics thresholds
analytics.churn.threshold=5.0
analytics.arpu.decline.threshold=10.0
analytics.sla.breach.threshold=90.0

# Scheduling
spring.task.scheduling.pool.size=5

# Peer module base URLs (used by the API-consumer clients when mock.clients.enabled=false).
# Ports match the reactor's actual service ports (see run-all.ps1).
teleconnect.modules.subscriber.base-url=${SUBSCRIBER_SERVICE_URL:http://localhost:8086}
teleconnect.modules.billing.base-url=${BILLING_SERVICE_URL:http://localhost:8085}
teleconnect.modules.usage.base-url=${USAGE_SERVICE_URL:http://localhost:8084}
teleconnect.modules.fault.base-url=${FAULT_SERVICE_URL:http://localhost:8090}

# HTTP client timeouts (used by RestClientConfig)
teleconnect.modules.connect-timeout-seconds=3
teleconnect.modules.read-timeout-seconds=5

# Logging
logging.level.root=INFO
logging.level.org.springframework=INFO
logging.level.com.teleconnect.analytics_service=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n

# Mock Clients: default true so analytics-service can run standalone without the peer modules.
# Set MOCK_CLIENTS_ENABLED=false in prod / when peer modules are up.
mock.clients.enabled=${MOCK_CLIENTS_ENABLED:true}

# Eureka client (register to local Eureka server)
spring.cloud.discovery.enabled=true
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=false
eureka.instance.hostname=localhost
eureka.instance.instance-id=${spring.application.name}:${server.port}
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.lease-renewal-interval-in-seconds=5
eureka.instance.lease-expiration-duration-in-seconds=10
