spring.application.name=notification

# JWT configuration for Notification module
jwt.secret=TeleConnect_Super_Secret_Key_2024_IAM_Min32Chars_XYZ
jwt.expiration=1800000
jwt.renewal.threshold.ms=600000

spring.datasource.url=jdbc:mysql://localhost:3306/teleconnect_notification?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

server.port=8087

app.scheduler.usage-alert.cron=0 0 * * * *
app.scheduler.plan-expiry.cron=0 0 8 * * *
app.scheduler.invoice-due.cron=0 0 9 * * *

app.notification.plan-expiry-reminder-days=3
app.notification.invoice-due-reminder-days=2

# Eureka client (register to local Eureka server)
spring.cloud.discovery.enabled=true
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=false
eureka.instance.hostname=localhost
eureka.instance.instance-id=${spring.application.name}:${server.port}
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.lease-renewal-interval-in-seconds=5
eureka.instance.lease-expiration-duration-in-seconds=10



